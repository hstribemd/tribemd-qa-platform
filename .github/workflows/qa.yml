name: QA TribeMD

# Os testes rodam LOCALMENTE (daily-audit.sh às 08:30) e publicam
# os resultados diretamente no branch gh-pages via publish-gh-pages.sh.
#
# Este workflow existe apenas como fallback manual para re-publicar
# relatórios já gerados sem precisar rodar os testes de novo.

on:
  workflow_dispatch:

jobs:
  republish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Verificar conteúdo atual do GitHub Pages
        run: |
          echo "Arquivos publicados:"
          ls -lh . | head -20
          echo ""
          echo "Dashboard disponível em: https://hstribemd.github.io/tribemd-qa-platform/"
